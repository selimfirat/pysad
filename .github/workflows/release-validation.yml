name: Release Validation

on:
  pull_request:
    paths:
      - ".github/workflows/**"
      - ".release-please-manifest.json"
      - "release-please-config.json"
      - "pyproject.toml"
      - "pysad/version.py"
      - "README.rst"
      - "README_template.rst"
      - "scripts/check_release_workflow.py"
  push:
    branches:
      - master
    paths:
      - ".github/workflows/**"
      - ".release-please-manifest.json"
      - "release-please-config.json"
      - "pyproject.toml"
      - "pysad/version.py"
      - "README.rst"
      - "README_template.rst"
      - "scripts/check_release_workflow.py"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-release:
    name: Validate release automation
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Check release workflow and PyPI API config
        run: python scripts/check_release_workflow.py

      - name: Install build tools
        run: python -m pip install --upgrade build twine

      - name: Build package
        run: python -m build

      - name: Check package metadata
        run: python -m twine check dist/*
